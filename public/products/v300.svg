  </defs>
  <rect width="600" height="600" fill="url(#bg)"/>
  <circle cx="300" cy="240" r="220" fill="url(#glow)"/>
  <rect x="80" y="500" width="440" height="6" rx="3" fill="url(#accent)" opacity="0.85"/>
  <text x="300" y="290" text-anchor="middle" font-family="Geist, 'Segoe UI', sans-serif" font-size="140" font-weight="800" fill="#ffffff" letter-spacing="2">V300</text>
  <text x="300" y="360" text-anchor="middle" font-family="Geist, 'Segoe UI', sans-serif" font-size="28" font-weight="500" fill="#bdb6bb" letter-spacing="6">POD DESCARTÁVEL</text>
  <text x="300" y="470" text-anchor="middle" font-family="Geist, 'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#e94db0" letter-spacing="3">SMOKE PODS</text>
</svg>
