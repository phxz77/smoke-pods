<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600" role="img" aria-label="V300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e0a10"/>
      <stop offset="100%" stop-color="#1d1018"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#e94db0" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#e94db0" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#e94db0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e94db0"/>
      <stop offset="100%" stop-color="#ee9c5a"/>
